name: Bug Report
description: Report a reproducible problem in KnowFlow
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "20.18.0"
    validations:
      required: true
  - type: input
    id: pnpm
    attributes:
      label: pnpm Version
      placeholder: "9.15.4"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove API keys and private content before pasting logs.
      render: shell
