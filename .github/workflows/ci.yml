name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  docker:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml build

      - name: Start Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d

      - name: Wait for health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5173/api/health; then
              exit 0
            fi
            docker compose -f docker-compose.yml -f docker-compose.build.yml logs --tail=50 knowflow
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.build.yml logs knowflow
          exit 1

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml down
